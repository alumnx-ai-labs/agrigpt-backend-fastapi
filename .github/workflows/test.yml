name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Provide dummy values so server.py loads without crashing
          MONGODB_URL: "mongodb://localhost:27017/test"
          AGENT_URL: "http://localhost:8020/chat"
          SPEECH_SERVICE_URL: "http://localhost:8001"
          SPEECH_SVC_URL: "http://localhost:8001"
          WHATSAPP_ORIGIN: ""
        run: python -m pytest tests/ -v --tb=short
